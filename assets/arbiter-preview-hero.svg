<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Arbiter beta preview</title>
  <desc id="desc">A verifier-grounded coding model route shown as a quiet technical diagram.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#11100c"/>
      <stop offset="0.5" stop-color="#18231f"/>
      <stop offset="1" stop-color="#0c1114"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#156054" stop-opacity="0.1"/>
      <stop offset="0.5" stop-color="#d7b56d" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#5ab5a8" stop-opacity="0.15"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="18"/></filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <g opacity="0.13" stroke="#f4efe3" stroke-width="1">
    <path d="M0 180H1600M0 360H1600M0 540H1600M0 720H1600"/>
    <path d="M200 0V900M400 0V900M600 0V900M800 0V900M1000 0V900M1200 0V900M1400 0V900"/>
  </g>
  <ellipse cx="840" cy="456" rx="520" ry="210" fill="#156054" opacity="0.23" filter="url(#blur)"/>
  <ellipse cx="1080" cy="456" rx="260" ry="105" fill="#b1542d" opacity="0.16" filter="url(#blur)"/>
  <path d="M220 468C420 316 600 316 802 468C1008 620 1178 620 1382 468" fill="none" stroke="url(#line)" stroke-width="28" stroke-linecap="round"/>
  <g fill="#11100c" stroke-width="3">
    <rect x="220" y="318" width="260" height="122" rx="18" stroke="#5ab5a8"/>
    <rect x="670" y="402" width="260" height="122" rx="18" stroke="#d7b56d"/>
    <rect x="1120" y="318" width="260" height="122" rx="18" stroke="#e7a46c"/>
  </g>
  <g font-family="Hanken Grotesk, Segoe UI, Arial, sans-serif" fill="#f4efe3">
    <text x="110" y="148" font-size="82" font-weight="600">Arbiter 0.1 beta</text>
    <text x="116" y="206" font-size="30" fill="#cfc7b7">A verifier-grounded coding model route for subscribers.</text>
    <text x="250" y="365" font-size="25" font-weight="600">Ornith</text>
    <text x="250" y="398" font-size="18" fill="#cfc7b7">coding LLM backbone</text>
    <text x="702" y="449" font-size="25" font-weight="600">Latent workspace</text>
    <text x="702" y="482" font-size="18" fill="#cfc7b7">branch control</text>
    <text x="1150" y="365" font-size="25" font-weight="600">Verifier</text>
    <text x="1150" y="398" font-size="18" fill="#cfc7b7">evidence decides</text>
    <text x="116" y="774" font-size="24" fill="#d8d0c0">Closed source beta - OpenAI-compatible - built for quiet, measured rollout</text>
